server:
  port: 8090
spring:
  application:
    name: fund-loading-application
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  liquibase:
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    open-in-view: false # JPA - Disable database queries from being performed during view rendering
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: caffeine
    configs:
      daily-amount:
        maximum-size: 100000
        expire-after-write: 1d
      weekly-amount:
        maximum-size: 100000
        expire-after-write: 7d
      daily-attempts:
        maximum-size: 100000
        expire-after-write: 1d

customer-limits:
  daily-amount-limit:
    max-amount: 5000
    max-attempts:
  weekly-amount-limit:
    max-amount: 20000
    max-attempts:
  daily-attempts-limit:
    max-amount:
    max-attempts: 3

# Sample 100% of requests (0.0 to 1.0) on dev
management:
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: false
  # disable export to metrics collector (e.g zipkin, jaeger) on dev
  otlp:
    metrics:
      export:
        enabled: false